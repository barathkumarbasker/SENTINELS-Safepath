<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safepath AI - Manage Zones</title>
    <link rel="icon" type="image/png" href="logo.jpg">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="safe-ui">
    <div class="main-container">
        <header class="safepath-header">
            <img src="logo.jpg" alt="Safepath AI Logo" class="logo-img">
            <h1 class="logo">Safepath AI</h1>
            <p class="tagline">Predictive Safety Intelligence</p>
        </header>

        <main class="page-content">
            <div class="form-container">
                <h2 class="form-title">
                    <img src="icons/map-plus.svg" alt="map plus icon" class="icon-small">
                    Create Safety Zone
                </h2>
                <form id="create-zone-form">
                    <div class="input-group">
                        <label for="zone-name">Zone Name *</label>
                        <input type="text" id="zone-name" placeholder="e.g., Home, Office, School" required>
                    </div>

                    <div class="form-row">
                        <div class="input-group flex-2">
                            <label for="zone-type">Zone Type</label>
                            <select id="zone-type">
                                <option value="home">Home</option>
                                <option value="work">Work</option>
                                <option value="school">School</option>
                                <option value="commute">Commute Point</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="input-group flex-1">
                            <label for="zone-radius">Radius (meters)</label>
                            <input type="number" id="zone-radius" value="200" step="50">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="zone-center">Zone Center (Location Name/Address) *</label>
                        <input type="text" id="zone-center" placeholder="Define the central point" required>
                        <p class="input-subtext-note">(Offline simulation of map picker)</p>
                    </div>

                    <div class="input-group">
                        <label for="zone-arrival-time">Typical Arrival Time (Optional)</label>
                        <div class="input-with-icon">
                            <img src="icons/clock.svg" alt="clock icon" class="icon-input">
                            <input type="time" id="zone-arrival-time">
                        </div>
                        <p class="input-subtext">For anomaly detection</p>
                    </div>

                    <div class="input-group">
                        <label for="zone-notes">Notes</label>
                        <textarea id="zone-notes" placeholder="Additional information..."></textarea>
                    </div>

                    <div class="input-group inline-toggle">
                        <label for="enable-alerts">Enable Alerts</label>
                        <label class="switch">
                            <input type="checkbox" id="enable-alerts" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <p class="input-subtext">Get notified about activity in this zone</p>

                    <div class="form-actions-row">
                        <button type="submit" class="wide-btn btn-black flex-1">
                            <img src="icons/plus.svg" alt="plus icon" class="icon-white icon-smed">
                            Create Zone
                        </button>
                        <button type="reset" class="text-btn flex-1" onclick="window.location.href='index.html'">Cancel</button>
                    </div>
                </form>
            </div>

            <section class="zones-list-section">
                <h3 class="section-title">Your Safety Zones</h3>
                <div id="zones-list-container" class="zones-list-container">
                    </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="icons/home.svg" alt="home" class="nav-icon">
                <span>Dashboard</span>
            </a>
            <a href="routes.html" class="nav-item">
                <img src="icons/path-icon.svg" alt="routes" class="nav-icon">
                <span>Routes</span>
            </a>
            <a href="zones.html" class="nav-item active">
                <img src="icons/map-pin.svg" alt="zones" class="nav-icon">
                <span>Zones</span>
            </a>
            <a href="threats.html" class="nav-item">
                <img src="icons/alert-circle.svg" alt="threats" class="nav-icon">
                <span>Threats</span>
            </a>
            <a href="#" class="nav-item">
                <img src="icons/settings.svg" alt="settings" class="nav-icon">
                <span>Settings</span>
            </a>
        </nav>
    </div>
    <script src="script.js"></script>
    <script>
        loadZonesList();
    </script>
</body>
</html>
