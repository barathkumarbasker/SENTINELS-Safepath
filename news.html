<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safepath AI - Local Safety News</title>
    <link rel="icon" type="image/png" href="logo.jpg">
    <link rel="stylesheet" href="styles.css">
    <style>
        .news-grid { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; min-height: 200px; }
        .news-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 15px;
            background: var(--bg-white);
            border-radius: 12px;
            border-left: 4px solid var(--safe-blue-main);
            transition: transform 0.2s;
            text-decoration: none;
        }
        .news-card:hover { transform: translateY(-2px); background: var(--bg-light-gray); }
        .news-card[href="javascript:void(0)"] { cursor: default; }
        .news-card[href="javascript:void(0)"]:hover { transform: none; }

        .news-tag {
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--safe-orange);
        }
        .news-title { font-size: 1rem; font-weight: 600; color: var(--text-main); margin: 0; }
        .news-meta { font-size: 0.75rem; color: var(--text-light); }
        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: var(--safe-blue-main);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .status-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 10px;
            float: right;
            background: var(--border-gray);
            color: var(--text-light);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="safe-ui">
    <div class="main-container">
        <header class="safepath-header">
            <img src="logo.jpg" alt="Safepath AI Logo" class="logo-img">
            <h1 class="logo">Safepath AI</h1>
            <p class="tagline">Local Safety Updates</p>
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                <svg id="sun-icon" class="hidden" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg id="moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#007bff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </header>

        <main class="page-content">
            <a href="threats.html" class="back-link">← Back to Threats</a>
            
            <h2 class="section-title">
                <span id="region-text">Safety News</span>
                <span id="data-status" class="status-badge">Checking...</span>
            </h2>
            
            <div id="news-container" class="news-grid">
                </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        const API_KEY = '2c54e1cd23b3bda7cca47c99e16c5944';
        const newsContainer = document.getElementById('news-container');
        const regionText = document.getElementById('region-text');
        const statusBadge = document.getElementById('data-status');

        const STORAGE_KEY = 'safepath_news_cache';
        const CACHE_TIMEOUT = 12 * 60 * 60 * 1000; // 12 Hours

        const offlineNews = [
            { tag: "Safety Alert", title: "Police patrols increased in high-density urban corridors.", source: {name: "Safepath AI Intel"}, url: "#" },
            { tag: "Community", title: "General safety advisory: Stay in well-lit areas during late hours.", source: {name: "Local Council"}, url: "#" },
            { tag: "Preloaded", title: "Connectivity is limited. Displaying fixed safety announcements.", source: {name: "System Update"}, url: "#" }
        ];

        function getCachedData() {
            try {
                const cached = localStorage.getItem(STORAGE_KEY);
                return cached ? JSON.parse(cached) : null;
            } catch (e) { return null; }
        }

        async function initNewsFlow() {
            const cached = getCachedData();
            const isOnline = navigator.onLine;

            // Step 1: Immediate display from Cache to prevent "white screen"
            if (cached) {
                const isFresh = (Date.now() - cached.timestamp < CACHE_TIMEOUT);
                renderNews(cached.articles, isOnline, isFresh ? "Cached" : "Old Cache");
                
                // If the cache is fresh, we don't need to hit the API and waste requests
                if (isFresh || !isOnline) return;
            }

            // Step 2: Fetch fresh data if Online
            if (isOnline) {
                try {
                    const response = await fetch(`https://gnews.io/api/v4/search?q=safety+OR+crime+OR+police&lang=en&country=in&token=${API_KEY}`);
                    if (!response.ok) throw new Error("Network response error");
                    
                    const data = await response.json();
                    if (data.articles && data.articles.length > 0) {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify({
                            timestamp: Date.now(),
                            articles: data.articles
                        }));
                        renderNews(data.articles, true, "Live");
                        return;
                    }
                } catch (e) {
                    console.error("API Fetch Failed:", e);
                }
            }

            // Step 3: Ultimate Fallback (No cache and Offline/API failed)
            if (!cached) {
                renderNews(offlineNews, false, "Default");
            }
        }

        function renderNews(articles, isOnline, mode = "") {
            statusBadge.innerText = isOnline ? `● ${mode}` : `○ Offline`;
            statusBadge.style.background = isOnline ? "var(--safe-blue-light)" : "var(--border-gray)";
            statusBadge.style.color = isOnline ? "var(--safe-blue-main)" : "var(--text-light)";
            
            if (!articles || articles.length === 0) {
                newsContainer.innerHTML = `<p style="text-align:center; padding: 20px;">No news available.</p>`;
                return;
            }

            newsContainer.innerHTML = articles.map(article => {
                const isRealLink = article.url && article.url !== "#";
                const target = isRealLink ? 'target="_blank"' : '';
                const link = isRealLink ? article.url : 'javascript:void(0)';

                return `
                    <a href="${link}" ${target} class="news-card">
                        <span class="news-tag">${article.tag || 'News Update'}</span>
                        <h3 class="news-title">${article.title}</h3>
                        <div class="news-meta">${article.source?.name || article.source || 'Intel'} • ${new Date().toLocaleDateString()}</div>
                    </a>
                `;
            }).join('');
        }

        // Listen for connection changes
        window.addEventListener('online', initNewsFlow);
        window.addEventListener('offline', () => {
            const cached = getCachedData();
            if (cached) renderNews(cached.articles, false, "Cached");
            else renderNews(offlineNews, false, "Default");
        });

        window.onload = () => {
            // Decouple Geolocation from News Loading to prevent hanging
            initNewsFlow();
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    () => { regionText.innerText = "Local Safety News"; },
                    () => { regionText.innerText = "General Safety News"; }
                );
            }
        };
    </script>
</body>
</html>
