<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safepath AI - Report Incident</title>
    <link rel="icon" type="image/png" href="logo.jpg">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="safe-ui">
    <div class="main-container">
        <header class="safepath-header">
            <img src="logo.jpg" alt="Safepath AI Logo" class="logo-img">
            <h1 class="logo">Safepath AI</h1>
            <p class="tagline">Predictive Safety Intelligence</p>
        </header>

        <main class="page-content">
            <div class="form-container">
                <h2 class="form-title">
                    <img src="icons/alert-octagon.svg" alt="alert icon" class="icon-small">
                    Report an Incident
                </h2>
                <form id="report-incident-form">
                    <div class="input-group">
                        <label for="incident-type">Incident Type *</label>
                        <select id="incident-type" required>
                            <option value="" disabled selected>Select Incident Type</option>
                            <option value="physical_harassment">Physical Harassment</option>
                            <option value="verbal_harassment">Verbal Harassment</option>
                            <option value="stalking">Stalking</option>
                            <option value="theft">Theft/Mugging</option>
                            <option value="other">Other Incident</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="input-group flex-2">
                            <label for="incident-time">Time *</label>
                            <div class="input-with-icon">
                                <img src="icons/clock.svg" alt="clock icon" class="icon-input">
                                <input type="time" id="incident-time" required>
                            </div>
                        </div>
                        <div class="input-group flex-2">
                            <label for="incident-date">Date *</label>
                            <div class="input-with-icon">
                                <img src="icons/calendar.svg" alt="calendar icon" class="icon-input">
                                <input type="date" id="incident-date" required>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="incident-location">Location Description *</label>
                        <input type="text" id="incident-location" placeholder="e.g., Near Main St underpass" required>
                        <p class="input-subtext-note">(Define the precise location. Live map picker is offline.)</p>
                    </div>

                    <div class="input-group inline-toggle">
                        <label for="anonymous-report">Report Anonymously?</label>
                        <label class="switch">
                            <input type="checkbox" id="anonymous-report">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <p class="input-subtext">Your name will be hidden</p>

                    <div class="input-group">
                        <label for="incident-notes">Description (Optional)</label>
                        <textarea id="incident-notes" placeholder="Please describe the incident..."></textarea>
                    </div>

                    <div class="form-actions-row">
                        <button type="submit" class="wide-btn btn-orange flex-1">
                            Submit Report
                        </button>
                        <button type="reset" class="text-btn flex-1" onclick="window.location.href='index.html'">Cancel</button>
                    </div>
                </form>
            </div>

            <section class="threats-list-section recent-threats">
                <h3 class="section-title section-header">Reported Local Incidents</h3>
                <div id="full-threats-list-container" class="threats-list-container full-list">
                    <div class="empty-threats-view" id="empty-threats-view-full">
                        <img src="icons/alert-triangle-dotted.svg" alt="dotted alert icon" class="icon-dotted">
                        <p class="no-threats-text">No threat reports yet</p>
                    </div>
                    </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <img src="icons/home.svg" alt="home" class="nav-icon">
                <span>Dashboard</span>
            </a>
            <a href="routes.html" class="nav-item">
                <img src="icons/path-icon.svg" alt="routes" class="nav-icon">
                <span>Routes</span>
            </a>
            <a href="zones.html" class="nav-item">
                <img src="icons/map-pin.svg" alt="zones" class="nav-icon">
                <span>Zones</span>
            </a>
            <a href="threats.html" class="nav-item active">
                <img src="icons/alert-circle.svg" alt="threats" class="nav-icon">
                <span>Threats</span>
            </a>
            <a href="#" class="nav-item">
                <img src="icons/settings.svg" alt="settings" class="nav-icon">
                <span>Settings</span>
            </a>
        </nav>
    </div>
    <script src="script.js"></script>
    <script>
        loadThreatsList();
    </script>
</body>
</html>
